<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCrawl</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />
    <script>
      // Apply the saved crawler before first paint to avoid an accent flash.
      // Sapphire is the default, so only ruby/topaz need stamping.
      var crawler = localStorage.getItem('opencrawl-crawler');
      if (crawler === 'ruby' || crawler === 'topaz') {
        document.documentElement.dataset.crawler = crawler;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
