# Local Postgres for OpenCrawl (Prisma). Start: npm run db:up
services:
  postgres:
    image: postgres:16-alpine
    container_name: opencrawl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencrawl
      POSTGRES_PASSWORD: opencrawl
      POSTGRES_DB: opencrawl
    ports:
      # Host port 5433: a native Windows PostgreSQL service already owns 5432.
      - "5433:5432"
    volumes:
      - opencrawl_pgdata:/var/lib/postgresql/data

volumes:
  opencrawl_pgdata:
